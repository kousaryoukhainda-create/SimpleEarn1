name: BrowserStack Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  browserstack:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download BrowserStackLocal
        run: |
          wget https://www.browserstack.com/browserstack-local/BrowserStackLocal-linux-x64
          chmod +x BrowserStackLocal-linux-x64

      - name: Start BrowserStackLocal
        run: |
          ./BrowserStackLocal-linux-x64 --key ${{ secrets.BROWSERSTACK_KEY }} &
          sleep 10
        env:
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Tests
        run: |
          echo "Running BrowserStack Android tests..."
          ./gradlew testDebugUnitTest
          # For instrumentation tests on BrowserStack devices:
          # ./gradlew connectedAndroidTest

      - name: Stop BrowserStackLocal
        if: always()
        run: |
          pkill -f BrowserStackLocal || true
